<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Medica+</title>
</head>
 
<body>
 
    <section class="hero">
 
        <a class="X" href="../../HTML/Home/index.html">X</a>
 
        <h1>Bem vindo(a)!</h1>
 
        <img src="../../img logo/img logo.png" alt="Logo Medica+">
 
        <form class="login-form">
 
            <input type="email" placeholder="exemplo@gmail.com" required>
 
            <div class="senha-container">
                <input type="password" placeholder="********" required>
                <button type="button" class="olho">👁</button>
            </div>
 
            <div class="linha-opcoes">
                <label>
                    <input type="checkbox"> Lembrar senha
                </label>
                <a href="#" class="esqueceu">Esqueceu sua senha?</a>
            </div>
 
            <button type="submit" class="btn-login">Login</button>
 
        </form>
 
        <p class="cadastro">Ainda não tem cadastro? <strong>cadastre-se</strong></p>
 
    </section>
 
    <div class="overlay" id="overlay-esqueci">
        <div class="modal-box">
 
            <h2>Esqueci minha senha</h2>
 
            <p class="modal-texto">
                Para recuperar sua senha, informe seu cpf ou email cadastrado
                na sua conta e lhe enviaremos um link com as instruções
            </p>
 
            <form class="form-esqueci">
                <label for="cpf-email">Cpf ou email</label>
                <input type="text" id="cpf-email" placeholder="">
 
                <button type="submit" class="btn-enviar">ENVIAR</button>
                <button type="button" class="btn-cancelar">Cancelar</button>
            </form>
 
        </div>
    </div>
 
    <script src="script.js"></script>
</body>
 
</html>
