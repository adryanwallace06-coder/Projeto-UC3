<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login Medica+</title>
</head>
 
<body>
 
    <section class="hero">
 
        <a class="X" href="../../HTML/Home/index.html">X</a>
 
        <h1>Bem vindo(a)!</h1>
 
        <img src="../../img logo/img logo.png" alt="Logo Medica+">
 
        <form class="login-form">
 
            <input type="email" placeholder="exemplo@gmail.com" required>
            <p class="erro-campo" id="erro-email"></p>
 
            <div class="senha-container">
                <input type="password" placeholder="********" required>
                <button type="button" class="olho">👁</button>
            </div>
 
            <div class="linha-opcoes">
                <label>
                    <input type="checkbox"> Lembrar senha
                </label>
                <a href="#" class="esqueceu">Esqueceu sua senha?</a>
            </div>
 
            <p class="erro-campo" id="erro-login"></p>
 
            <button type="submit" class="btn-login">Login</button>
 
        </form>
 
        <p class="cadastro">Ainda não tem cadastro? <strong>cadastre-se</strong></p>
 
    </section>
 
    <div class="overlay" id="overlay-esqueci">
        <div class="modal-box">
 
            <h2>Esqueci minha senha</h2>
 
            <p class="modal-texto">
                Para recuperar sua senha, informe seu cpf ou email cadastrado
                na sua conta e lhe enviaremos um link com as instruções
            </p>
 
            <form class="form-esqueci">
                <label for="cpf-email">Cpf ou email</label>
                <input type="text" id="cpf-email" placeholder="">
 
                <p class="erro-campo" id="erro-esqueci"></p>
 
                <button type="submit" class="btn-enviar">ENVIAR</button>
                <button type="button" class="btn-cancelar">Cancelar</button>
            </form>
 
        </div>
    </div>
 
    <div class="overlay" id="overlay-cadastro">
        <div class="modal-box modal-cadastro">
 
            <h2>Cadastre-se</h2>
 
            <form class="form-cadastro">
 
                <label for="nome">Nome completo <span class="obrigatorio">*</span></label>
                <input type="text" id="nome" required>
 
                <label for="cpf">Cpf <span class="obrigatorio">*</span></label>
                <input type="text" id="cpf" maxlength="11" inputmode="numeric" required>
                <p class="erro-campo" id="erro-cpf"></p>
 
                <div class="opcoes-papel">
                    <label>
                        <input type="radio" name="papel" value="cuidador" required> Cuidador
                    </label>
                    <label>
                        <input type="radio" name="papel" value="paciente"> Paciente
                    </label>
                    <label>
                        <input type="radio" name="papel" value="parente"> Parente
                    </label>
                </div>
 
                <label for="email-cadastro">Email <span class="obrigatorio">*</span></label>
                <input type="email" id="email-cadastro" required>
                <p class="erro-campo" id="erro-email-cadastro"></p>
 
                <label for="senha-cadastro">Crie uma senha <span class="obrigatorio">*</span></label>
                <input type="password" id="senha-cadastro" required>
 
                <label for="confirma-senha">Confirme sua senha <span class="obrigatorio">*</span></label>
                <input type="password" id="confirma-senha" required>
 
                <p class="erro-campo" id="erro-cadastro"></p>
 
                <button type="submit" class="btn-enviar">Cadastrar</button>
                <button type="button" class="btn-cancelar" id="cancelar-cadastro">Cancelar</button>
 
            </form>
 
        </div>
    </div>
 
    <script src="script.js"></script>
</body>
 
</html>
